<div class="login-container">
  <h2>Login to Smart Campus</h2>

  <!-- 
    Using a standard <form> tag is crucial for Google Password Manager 
    to recognize this as a login attempt.
  -->
  <form (ngSubmit)="handleLogin()" #loginForm="ngForm">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input
        id="email"
        type="email"
        name="email" 
        [(ngModel)]="credentials.email"
        autocomplete="username email" 
        required
        placeholder="Enter your campus email"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="credentials.password"
        autocomplete="current-password"
        required
        placeholder="Enter your password"
      />
    </div>

    <button type="submit" [disabled]="!loginForm.valid" class="signin-button">
      Sign In with Password
    </button>
  </form>

  <div class="divider">
    <span>OR</span>
  </div>

  <div id="google-button-container" class="google-btn-wrapper"></div>
</div>
