<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Smart Campus Ops Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%230b74de'/%3E%3Ctext x='50' y='65' font-size='60' text-anchor='middle' fill='white' font-family='Arial'%3ES%3C/text%3E%3C/svg%3E" />
    <style>
      body { font-family: system-ui; margin: 0; padding: 20px; background: #f9f9f9; }
      .loading { color: #666; }
      .error { color: red; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="loading">Loading Smart Campus Ops Hub...</div>
    <div id="error-container"></div>
    <app-root></app-root>
    <script>
      console.log('=== index.html loaded ===');
      console.log('app-root element:', document.querySelector('app-root'));
      
      // Catch any global errors
      window.addEventListener('error', (event) => {
        console.error('Global error:', event.error);
        document.getElementById('error-container').innerHTML = '<div class="error">Error: ' + event.error + '</div>';
      });
      
      // Catch unhandled promise rejections
      window.addEventListener('unhandledrejection', (event) => {
        console.error('Unhandled rejection:', event.reason);
        document.getElementById('error-container').innerHTML = '<div class="error">Error: ' + event.reason + '</div>';
      });
    </script>
  </body>
</html>
